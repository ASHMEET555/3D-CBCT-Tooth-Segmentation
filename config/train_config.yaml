seed: 42

dataset:
  processed_dir: data/processed
  splits_dir: data/splits
  num_classes: 49

model:
  architecture: nnunet_resencl
  in_channels: 1
  num_classes: 49
  deep_supervision: true

training:
  epochs: 500
  batch_size: 2
  patch_size: [128, 128, 128]
  lr: 0.01
  momentum: 0.99
  weight_decay: 3.0e-5
  poly_exp: 0.9
  mixed_precision: true
  grad_clip: 1.0

loss:
  dice_weight: 1.0
  ce_weight: 1.0
  smooth: 1.0e-5
  ignore_index: -1

augmentation:
  flip_p: 0.5
  rotation_p: 0.3
  elastic_p: 0.2
  noise_p: 0.15
  blur_p: 0.2

hardware:
  workers: 4
  pin_memory: true
  persistent_workers: true

logging:
  checkpoint_dir: weights
  val_every_n_epochs: 50
  log_every_n_steps: 20
  tensorboard: true
